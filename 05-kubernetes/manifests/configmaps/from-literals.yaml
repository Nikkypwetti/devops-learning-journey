# ConfigMap created from literals
# Create with: kubectl create configmap app-config --from-literal=APP_ENV=production --from-literal=LOG_LEVEL=info
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  labels:
    app: myapp
data:
  APP_ENV: production
  LOG_LEVEL: info
  MAX_CONNECTIONS: "100"
  TIMEOUT_SECONDS: "30"