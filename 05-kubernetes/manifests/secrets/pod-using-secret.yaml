# Example Pod using Secrets as environment variables and volumes
apiVersion: v1
kind: Pod
metadata:
  name: secret-demo-pod
  namespace: default
spec:
  # Use image pull secret if needed
  imagePullSecrets:
  - name: regcred
  
  containers:
  - name: app
    image: nginx:alpine
    env:
    # Secret as environment variable
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: password
    - name: API_KEY
      valueFrom:
        secretKeyRef:
          name: api-secret
          key: api-key
    
    # Mount secret as volume
    volumeMounts:
    - name: secret-volume
      mountPath: /etc/secrets
      readOnly: true
    
    # Mount specific secret files
    - name: tls-volume
      mountPath: /etc/ssl/private
      readOnly: true
  
  volumes:
  # Secret volume (creates a file per key)
  - name: secret-volume
    secret:
      secretName: app-secrets
      # Optional: specify specific keys and permissions
      items:
      - key: DATABASE_URL
        path: db-connection.txt
        mode: 0644
      - key: REDIS_PASSWORD
        path: redis-password.txt
        mode: 0600
  
  # TLS secret volume
  - name: tls-volume
    secret:
      secretName: my-tls-secret
      defaultMode: 0400