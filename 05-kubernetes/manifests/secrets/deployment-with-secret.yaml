# Deployment using secrets best practices
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      # Image pull secret for private registry
      imagePullSecrets:
      - name: regcred
      
      containers:
      - name: app
        image: myregistry.azurecr.io/secure-app:v1
        ports:
        - containerPort: 8080
        
        env:
        # Non-sensitive config from ConfigMap
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: environment
        
        # Sensitive data from secrets
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
              optional: false  # Required, fail if missing
        
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: api-key
              optional: true  # Optional, continue if missing
        
        # Volume mount for secrets
        volumeMounts:
        - name: secrets-volume
          mountPath: /app/secrets
          readOnly: true
      
      volumes:
      - name: secrets-volume
        secret:
          secretName: app-secrets
          defaultMode: 0400  # Read-only for non-root