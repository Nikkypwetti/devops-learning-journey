# Method 1: Create Secret from literals (using kubectl)
# Command: kubectl create secret generic db-secret --from-literal=username=admin --from-literal=password=S3cr3tPass

# Method 2: YAML definition (values must be base64 encoded)
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: default
type: Opaque
data:
  # echo -n 'admin' | base64
  username: YWRtaW4=
  # echo -n 'S3cr3tPass' | base64
  password: UzNjcjN0UGFzcw==