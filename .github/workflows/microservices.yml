name: CI/CD Final Project 

on:
  push:
    branches: [ "main" ]
    paths:
      # Watch the entire microservices project folder
      - '04-containerization/projects/microservices/voting-app-project/**'
      # ALSO watch the workflow file itself so it triggers when you edit the YAML!
      - '.github/workflows/microservices.yml'
  
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./04-containerization/projects/microservices/voting-app-project
    strategy:
      matrix:
        service: [vote, worker, result] # Base list
        include:
          - service: vote
            folder: vote
          - service: worker
            folder: worker
          - service: result
            folder: voting-frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Debugger
        run: |
          echo "Current Directory: $(pwd)"
          echo "Listing all files:"
          find . -maxdepth 3 -not -path '*/.*'
          
      - name: Build Local Image for Testing
        run: |
          # Use the 'folder' variable from our matrix
          docker build -t test-image:${{ github.sha }} ./${{ matrix.folder }}

      # FEATURE: Trivy Security Scan
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-image:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # This stops the pipeline if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Login to Docker Hub
        if: success() # Only login if the security scan passes
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/04-containerization/projects/microservices/voting-app-project/${{ matrix.folder }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-${{ matrix.service }}:${{ github.sha }}



     