# Docker Compose file for development environment files for local development with hot-reload and debugging:
services:
  app:
    build:
      context: ../../
      dockerfile: dockerfiles/nodejs/dev.Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
      - "9229:9229"  # Node.js debug port
    environment:
      - NODE_ENV=development
      - DEBUG=true
    volumes:
      - ../../projects/day21-secure-setup/app:/app  # Mount for hot-reload
      - /app/node_modules  # Don't override container node_modules
    command: npm run dev  # Use nodemon for auto-restart