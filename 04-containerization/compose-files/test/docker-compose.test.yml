# Docker Compose file for testing environment with optimized settings for fast feedback and reliability:
services:
  app-test:
    build:
      context: ../../
      dockerfile: dockerfiles/nodejs/test.Dockerfile
    environment:
      - NODE_ENV=test
      - DB_HOST=db-test
      - REDIS_HOST=redis-test
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: npm test  # Run tests, not start server

  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    tmpfs: /var/lib/postgresql/data  # Use RAM for speed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s  # Faster checks for testing

  redis-test:
    image: redis:alpine
    tmpfs: /data  # Use RAM for speed
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s