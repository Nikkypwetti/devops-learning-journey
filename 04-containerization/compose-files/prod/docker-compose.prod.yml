# Docker Compose file for production environment with optimized settings for performance, security, and reliability:
services:
  app:
    image: ${REGISTRY:-docker.io}/${IMAGE_NAME:-secure-app}:${TAG:-latest}
    restart: always
    environment:
      - NODE_ENV=production
      - APP_SECRET=${APP_SECRET}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

secrets:
  db_password:
    external: true  # Use Docker secrets in swarm mode

volumes:
  postgres-data:
    external: true