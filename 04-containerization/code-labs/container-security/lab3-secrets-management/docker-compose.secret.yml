# Docker Compose file for secrets management example using Docker secrets and build args
services:
  app:
    build:
      context: .
      args:
        DB_HOST: ${DB_HOST}
      secrets:
        - db_password
    environment:
      - DB_USER=${DB_USER}
      - DB_HOST=db
    secrets:
      - db_password
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password

secrets:
  db_password:
    file: ./secrets/db_password.txt  # Never commit this file!