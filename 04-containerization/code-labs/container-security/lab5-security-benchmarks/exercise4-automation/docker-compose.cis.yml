# Docker Compose file for running a CIS-compliant web application and a security benchmark scanner
services:
  # CIS-compliant web app
  web:
    build:
      context: .
      dockerfile: Dockerfile.secure
    image: cis-compliant-web:latest
    container_name: web-cis
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
      - /var/run:rw,noexec,nosuid,size=10m
    volumes:
      - web-logs:/var/log
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-profile.json
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - secure-net
    restart: unless-stopped

  # Security scanner
  bench-scanner:
    image: docker/docker-bench-security
    container_name: cis-scanner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc:/etc:ro
      - ./reports:/reports
    command: sh -c "docker-bench-security > /reports/scan-$(date +%Y%m%d-%H%M%S).txt"
    networks:
      - secure-net
    depends_on:
      web:
        condition: service_healthy

networks:
  secure-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  web-logs: