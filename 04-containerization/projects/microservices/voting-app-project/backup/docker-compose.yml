services:
  vote:
    build: ./vote
    image: ${DOCKER_REGISTRY}/voting-vote:${VERSION:-latest}
    environment:
      - REDIS_HOST=redis
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  result:
    build: ./result
    image: ${DOCKER_REGISTRY}/voting-result:${VERSION:-latest}
    networks:
      - backend

  worker:
    build: ./worker
    image: ${DOCKER_REGISTRY}/voting-worker:${VERSION:-latest}
    networks:
      - frontend
      - backend

  redis:
    image: redis:alpine
    networks:
      - frontend

  db:
    image: postgres:15-alpine
    networks:
      - backend
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password

networks:
  frontend:
  backend:

secrets:
  db_password:
    file: ./db_password.txt
