events {
    worker_connections 1024;
}

http {
    # This tells Nginx how to find the other containers in the Swarm network
    resolver 127.0.0.11 valid=10s;

    # Professional WebSocket Support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # 1. The Voting UI (Next.js)
        location / {
            proxy_pass http://vote:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 2. The Live Results & WebSocket Gateway
        location /result {
            proxy_pass http://result:3000;
            
            # CRITICAL: WebSocket Upgrade Headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 3. Socket.io Specific Path
        location /socket.io/ {
            proxy_pass http://result:3000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /health {
          return 200 'OK';
       }
    }
}