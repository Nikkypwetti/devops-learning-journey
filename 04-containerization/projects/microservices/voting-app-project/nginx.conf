events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver
    resolver 127.0.0.11 valid=5s; 
    include /etc/nginx/mime.types;

    # WebSocket mapping for proper handshake
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream result_server {
    ip_hash; #This ensures one user stays with one replica
    server result:3000;
  }

    server {
        listen 80;

        # 1. WEBSOCKETS (Socket.io)
        location /socket.io/ {
            set $result_service result;
            proxy_pass http://$result_service:3000;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_connect_timeout 5s;
            proxy_read_timeout 86400s;
        }

        # 2. VOTE API
        location /api/vote {
    proxy_pass http://vote:80;
    
    # 1. Standard Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # 2. CORS Headers for the actual POST/GET requests
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

    # 3. Pre-flight OPTIONS check
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }
}

        # 3. THE UNIFIED UI (Replaces your two duplicate '/' blocks)
        location / {
            set $result_backend result;
            proxy_pass http://$result_backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # 4. STATIC FILES
        location /_next/static {
            proxy_pass http://result:3000/_next/static;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 5. HEALTH CHECK
        location /health {
            return 200 'OK';
        }
    }
}